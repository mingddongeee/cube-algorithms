<!DOCTYPE html>
<html lang="ko">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Competition Recap 결과
  </title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js">
  </script>
  <style>
   * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  background: #f5f5f5;
  color: #111;
  transition: 0.3s;
}

a {
  text-decoration: none;
  color: inherit;
}

button {
  border: none;
  cursor: pointer;
  font-family: sans-serif;
}

header {
  width: 100%;
  height: 85px;
  background: #050505;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 50px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px
}

.logo-icon {
  font-size: 22px
}

.logo h1 {
  color: white;
  font-size: 22px;
  white-space: nowrap
}

.yellow {
  color: #ffd400
}

nav {
  display: flex;
  align-items: center;
  gap: 65px;
  margin-left: 60px
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 18px;
  font-weight: 500;
  padding: 28px 0;
  position: relative;
  transition: 0.2s
}

nav>a:hover,
.dropdown>a:hover {
  color: #facc15
}

nav>a.active,
.dropdown>a.active {
  color: #facc15
}

nav>a.active::after,
.dropdown>a.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 18px;
  width: 100%;
  height: 4px;
  background: #facc15;
  border-radius: 999px
}

.dropdown {
  position: relative
}

.dropdown>a {
  display: block
}

.dropdown-menu {
  position: absolute;
  top: 78px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  min-width: 190px;
  padding: 10px;
  background: #111;
  border-radius: 18px;
  box-shadow: 0 12px 28px rgba(0, 0, 0, .3);
  opacity: 0;
  visibility: hidden;
  transition: .2s;
  z-index: 999
}

.dropdown:hover .dropdown-menu {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0)
}

.dropdown-menu a {
  display: block;
  padding: 12px 16px;
  color: white;
  font-size: 15px;
  font-weight: 500;
  border-radius: 12px;
  white-space: nowrap
}

.dropdown-menu a:hover {
  background: #facc15;
  color: #111
}

.icon-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #ffd400;
  color: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  transition: .2s;
  cursor: pointer
}

.icon-btn:hover {
  border: 2px solid white;
  transform: translateY(-2px)
}

.container {
  width: 95%;
  margin: 30px auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px
}

.result-head {
  width: 760px;
  max-width: 100%;
  background: white;
  border-radius: 26px;
  padding: 28px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, .05)
}

.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 14px
}

.title-bar {
  width: 6px;
  height: 30px;
  background: #ffd400;
  border-radius: 999px
}

.section-desc {
  color: #555;
  font-size: 16px;
  line-height: 1.7
}

.action-row {
  width: 760px;
  max-width: 100%;
  display: flex;
  gap: 14px;
   justify-content: center;
}

.action-row button {
  padding: 16px 34px;
  border-radius: 16px;
  font-size: 18px;
  font-weight: bold;
  transition: .2s
}

.yellow-btn {
  background: #ffd400;
  color: black
}

.red-btn{
  background:white;
  border:1px solid #ddd;
}

.gray-btn {
  background:white;
  border:1px solid #ddd;
}

.action-row button:hover {
  transform: translateY(-3px)
}

.recap-card {
  width: 760px;
  background: #111;
  color: white;
  border-radius: 32px;
  padding: 34px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, .25)
}

.recap-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 16px
}

.qr-box {
  width: 74px;
  height: 74px;
  background: white;
  border-radius: 14px;
  padding: 7px;
  flex-shrink: 0;
  display: none
}

.qr-box canvas {
  width: 100%;
  height: 100%
}

.best-staff-badge {
  background: #a855f7;
  color: white;
  padding: 9px 14px;
  border-radius: 999px;
  font-weight: 900;
  font-size: 13px;
  display: none;
  text-align: center;
  margin-bottom: 12px
}

.main-badge {
  display: inline-block;
  background: #facc15;
  color: #111;
  padding: 9px 14px;
  border-radius: 999px;
  font-weight: 900;
  font-size: 13px;
  margin-bottom: 10px
}

.recap-title h2 {
  font-size: 34px;
  line-height: 1.1;
  margin-bottom: 8px
}

.date,
.venue,
.player-info {
  color: rgba(255, 255, 255, .78);
  font-size: 14px;
  line-height: 1.5
}

.first-badge {
  display: inline-block;
  background: #facc15;
  color: #111;
  padding: 4px 9px;
  border-radius: 999px;
  font-weight: 900;
  font-size: 12px;
  margin-top: 4px
}

.photo-box {
  width: 100%;
  height: 210px;
  background: rgba(255, 255, 255, .12);
  border-radius: 24px;
  margin-bottom: 22px;
  overflow: hidden;
  display: none;
  align-items: center;
  justify-content: center
}

.photo-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform-origin: center;
  display: block
}

.summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 18px
}

.summary-item {
  background: rgba(255, 255, 255, .13);
  border-radius: 18px;
  padding: 15px 10px;
  text-align: center
}

.summary-item strong {
  display: block;
  font-size: 22px;
  color: #facc15
}

.summary-item span {
  font-size: 12px;
  color: rgba(255, 255, 255, .78)
}

.pr-detail {
  font-size: 12px;
  font-weight: 800;
  margin-top: 3px;
  color: inherit;
  opacity: .85
}

.award-section {
  display: none;
  background: rgba(255, 255, 255, .13);
  border-radius: 18px;
  padding: 15px;
  margin-bottom: 18px
}

.award-section h3 {
  font-size: 16px;
  margin-bottom: 10px;
  color: #facc15
}

.award-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px
}

.award-pill {
  background: #facc15;
  color: #111;
  border-radius: 999px;
  padding: 7px 11px;
  font-size: 13px;
  font-weight: 900
}

.event-list {
  display: grid;
  gap: 14px
}

.event-group-title {
  color: #facc15;
  font-size: 18px;
  font-weight: 900;
  margin-top: 8px;
  margin-bottom: -4px
}

.event-card {
  background: white;
  color: #111;
  border-radius: 22px;
  padding: 18px
}

.event-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px
}

.event-left {
  display: flex;
  gap: 12px;
  align-items: center
}

.event-icon {
  width: 52px;
  height: 52px;
  border-radius: 15px;
  background: #f4f4f5;
  border: 1px solid #e5e7eb;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-shrink: 0;
  font-size: 12px;
  font-weight: bold
}

.event-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  padding: 0;
}

.event-name {
  font-size: 20px;
  font-weight: 900
}

.round-name {
  color: #777;
  font-size: 13px;
  margin-top: 3px
}

.badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end
}

.rank,
.medal-badge,
.avg-pr-badge,
.single-pr-badge,
.record-badge {
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap
}

.rank {
  background: #111;
  color: white
}

.medal-badge {
  background: #facc15;
  color: #111
}

.avg-pr-badge {
  background: #ef4444;
  color: white
}

.single-pr-badge {
  background: #3b82f6;
  color: white
}

.record-badge {
  background: #111827;
  color: white
}

.result-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px
}

.result-box {
  flex: 1;
  background: #f4f4f5;
  border-radius: 14px;
  padding: 10px
}

.result-box span {
  display: block;
  color: #777;
  font-size: 12px;
  margin-bottom: 4px
}

.result-box strong {
  font-size: 18px
}

.attempts {
  display: flex;
  flex-wrap: wrap;
  gap: 7px
}

.attempt {
  background: #facc15;
  color: #111;
  padding: 6px 9px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: bold
}

.footer {
  margin-top: 22px;
  text-align: center;
  color: rgba(255, 255, 255, .72);
  font-size: 13px
}

body.dark {
  background: #111827;
  color: white
}

body.dark .result-head {
  background: #1f2937;
  border-color: #374151;
  box-shadow: none
}

body.dark .section-desc {
  color: #cbd5e1
}

@media(max-width:1000px){

  nav{
    gap:20px;
    margin-left:0;
  }

  .recap-card,
  .result-head,
  .action-row{
    width:100%;
  }

  .action-row{
    flex-direction:column;
  }
}

@media(max-width:650px){

  header{
    padding:0 20px;
  }

  nav{
    display:none;
  }

  .container{
    width:92%;
    margin:20px auto;
  }

  .result-head{
    padding:22px;
  }

  .section-title{
    font-size:22px;
  }

  .section-desc{
    font-size:14px;
  }

  .recap-card{
    padding:22px;
    border-radius:24px;
  }

  .recap-top{
    flex-direction:column;
    gap:16px;
  }

  .recap-title h2{
    font-size:26px;
  }

  .photo-box{
    height:170px;
  }

  .summary{
    grid-template-columns:1fr;
  }

  .event-top{
    flex-direction:column;
    align-items:flex-start;
  }

  .badges{
    justify-content:flex-start;
  }

  .result-row{
    flex-direction:column;
  }

  .action-row{
    flex-direction:column;
  }

  .action-row button{
    width:100%;
    font-size:16px;
  }

  .event-name{
    font-size:18px;
  }

  .event-icon{
    width:44px;
    height:44px;
  }

  .attempts{
    gap:6px;
  }

  .attempt{
    font-size:12px;
  }
}

  </style>
 </head>
 <body>
  <div class="container">
   <div class="result-head">
    <div class="section-title">
     <div class="title-bar">
     </div>
     리캡 카드 미리보기
    </div>
    <p class="section-desc">
     입력한 대회 기록을 바탕으로 생성된 카드입니다. 수정이 필요하면 입력 페이지로 돌아갈 수 있습니다.
    </p>
   </div>
   <div class="recap-card" id="recapCard">
    <div class="best-staff-badge" id="bestStaffBadge">
     BEST STAFF AWARD
    </div>
    <div class="recap-top">
     <div>
      <div class="main-badge" id="mainBadge">
       CUBE RECAP
      </div>
      <div class="recap-title">
       <h2 id="cardTitle">
        대회명을 입력하세요
       </h2>
       <div class="date" id="cardDate">
        대회 날짜
       </div>
       <div class="venue" id="cardVenue">
        대회 장소
       </div>
       <div class="player-info" id="playerInfo">
        참가자 정보를 입력하세요
       </div>
      </div>
     </div>
     <div class="qr-box" id="qrBox">
      <canvas id="qrCanvas">
      </canvas>
     </div>
    </div>
    <div class="photo-box" id="photoBox">
    </div>
    <div class="summary">
     <div class="summary-item">
      <strong id="eventCount">
       0
      </strong>
      <span>
       Events
      </span>
     </div>
     <div class="summary-item">
      <strong id="bestRank">
       -
      </strong>
      <span>
       Best Rank
      </span>
     </div>
     <div class="summary-item">
      <strong id="totalPrCount">
       0
      </strong>
      <span>
       Total PR
      </span>
      <div class="pr-detail">
       Avg
       <span id="avgPrCount">
        0
       </span>
       &middot; Single
       <span id="singlePrCount">
        0
       </span>
      </div>
     </div>
    </div>
    <div class="award-section" id="awardSection">
     <h3>
      Awards
     </h3>
     <div class="award-list" id="awardList">
     </div>
    </div>
    <div class="event-list" id="eventList">
    </div>
    <div class="footer">
     Made for cubers &middot; Competition Memories
    </div>
   </div>
   <div class="action-row">
    <button class="gray-btn" onclick="location.href='/competition-recap.html'">
     수정하기
    </button>
    <button class="red-btn" onclick="startNewRecap()">
     새로 만들기
    </button>
    <button class="yellow-btn" onclick="downloadCard()">
     이미지 저장하기
    </button>
   </div>
  </div>
  <script>
   const calcOptions = {
  ao5: {
    label: "Average of 5",
    avgLabel: "Average",
    bestLabel: "Best"
  },
  mo3: {
    label: "Mean of 3",
    avgLabel: "Mean",
    bestLabel: "Best"
  },
  bo3: {
    label: "Best of 3",
    avgLabel: "Result",
    bestLabel: "Best"
  },
  wo3: {
    label: "Worst of 3",
    avgLabel: "Result",
    bestLabel: "Worst"
  },
  single: {
    label: "Single Only",
    avgLabel: "Result",
    bestLabel: "Best"
  },
  fmc: {
    label: "FMC Mean",
    avgLabel: "Mean",
    bestLabel: "Best"
  }
};
const lightThemes = ["#f8fafc", "#fef3c7", "#fde2e4", "#e0f2fe", "#dcfce7", "#ede9fe", "#ffedd5", "#ccfbf1", "#fae8ff", "#dbeafe"];

function formatDate(dateValue) {
  if (!dateValue) return "대회 날짜";
  const d = new Date(dateValue);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
}

function isLightTheme(color) {
  return lightThemes.includes(color)
}

function makeQR() {
  new QRious({
    element: document.getElementById("qrCanvas"),
    value: window.location.href,
    size: 140,
    background: "white",
    foreground: "black"
  });
}
async function loadRecapData() {
  let data = null;
  const saved = sessionStorage.getItem("competitionRecapData");
  if (saved) data = JSON.parse(saved);
  if (!data) {
    try {
      const res = await fetch("/getRecap");
      data = await res.json();
    } catch (e) {}
  }
  if (!data || !data.events) {
    alert("저장된 리캡 데이터가 없습니다. 입력 페이지로 이동합니다.");
    location.href = "/competition-recap.html";
    return;
  }
  makeCard(data);
}

function makeCard(data) {
  const theme = data.theme || "#111111";
  const light = isLightTheme(theme);
  const recapCard = document.getElementById("recapCard");
  recapCard.style.background = theme;
  recapCard.style.color = light ? "#111" : "white";
  document.querySelectorAll(".date,.venue,.player-info,.footer").forEach(el => {
    el.style.color = light ? "rgba(0,0,0,0.65)" : "rgba(255,255,255,0.78)"
  });
  document.querySelectorAll(".summary-item").forEach(el => {
    el.style.background = light ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.13)"
  });
  document.querySelectorAll(".summary-item span").forEach(el => {
    el.style.color = light ? "rgba(0,0,0,0.65)" : "rgba(255,255,255,0.78)"
  });
  document.getElementById("awardSection").style.background = light ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.13)";
  document.getElementById("mainBadge").textContent = data.isWcaCompetition ? "WCA COMPETITION" : "CUBE RECAP";
  document.getElementById("cardTitle").textContent = data.compName || "대회명을 입력하세요";
  document.getElementById("cardDate").textContent = formatDate(data.compDate);
  document.getElementById("cardVenue").textContent = data.compVenue || "대회 장소";
  let infoHTML = "";
  const nameLine = `${data.playerKr||""} ${data.playerEn||""}`.trim();
  if (nameLine) infoHTML += `<div>${nameLine}</div>`;
  if (data.wcaId) infoHTML += `<div>WCA ID: ${data.wcaId}</div>`;
  if (data.firstComp) infoHTML += `<div><span class="first-badge">FIRST COMPETITION</span></div>`;
  document.getElementById("playerInfo").innerHTML = infoHTML || "참가자 정보를 입력하세요";
  document.getElementById("bestStaffBadge").style.display = data.bestStaff ? "block" : "none";
  const qrBox = document.getElementById("qrBox");
  qrBox.style.display = data.showQr ? "block" : "none";
  if (data.showQr) makeQR();
  const photoBox = document.getElementById("photoBox");
  if (data.uploadedImage) {
    photoBox.style.display = "flex";
    photoBox.innerHTML = `<img src="${data.uploadedImage}" style="transform:scale(${data.photoZoom||1}); object-position:${data.photoX||50}% ${data.photoY||50}%">`;
  } else {
    photoBox.style.display = "none";
    photoBox.innerHTML = "";
  }
  const events = data.events || [];
  const eventList = document.getElementById("eventList");
  eventList.innerHTML = "";
  let ranks = [],
    avgPrCount = 0,
    singlePrCount = 0,
    awards = [],
    currentEvent = "";
  events.forEach(item => {
    if (item.rank && !isNaN(parseInt(item.rank))) ranks.push(parseInt(item.rank));
    if (item.avgPr) avgPrCount++;
    if (item.singlePr) singlePrCount++;
    if (item.medal) awards.push(`${item.event} ${item.medal}`);
    if (item.event !== currentEvent) {
      currentEvent = item.event;
      eventList.innerHTML += `<div class="event-group-title">${item.event}</div>`;
    }
    const rankText = item.rank && item.total ? `${item.rank} / ${item.total}` : item.rank ? item.rank : "";
    const medalText = item.medal === "1st" ? "🥇 1st" : item.medal === "2nd" ? "🥈 2nd" : item.medal === "3rd" ? "🥉 3rd" : "";
    const attemptsHTML = (item.attempts || []).map(a => `<span class="attempt">${a}</span>`).join("");
    const iconHTML = item.eventImg ? `<img src="${item.eventImg}" onerror="this.style.display='none';this.parentElement.textContent='${item.event}'">` : `${item.event}`;
    eventList.innerHTML += `<div class="event-card"><div class="event-top"><div class="event-left"><div class="event-icon">${iconHTML}</div><div><div class="event-name">${item.event}</div><div class="round-name">${item.round} · ${calcOptions[item.calcType]?.label||""}</div></div></div><div class="badges">${medalText?`<span class="medal-badge">${medalText}</span>`:""}${item.avgPr?`<span class="avg-pr-badge">Avg PR</span>`:""}${item.singlePr?`<span class="single-pr-badge">Single PR</span>`:""}${item.wr?`<span class="record-badge">WR</span>`:""}${item.cr?`<span class="record-badge">CR</span>`:""}${item.nr?`<span class="record-badge">NR</span>`:""}${rankText?`<span class="rank">${rankText}</span>`:""}</div></div><div class="result-row"><div class="result-box"><span>${item.avgLabel}</span><strong>${item.avg}</strong></div><div class="result-box"><span>${item.bestLabel}</span><strong>${item.best}</strong></div></div><div class="attempts">${attemptsHTML}</div></div>`;
  });
  if (data.bestStaff) awards.unshift("Best Staff Award");
  const awardSection = document.getElementById("awardSection"),
    awardList = document.getElementById("awardList");
  if (awards.length) {
    awardSection.style.display = "block";
    awardList.innerHTML = awards.map(a => `<span class="award-pill">${a}</span>`).join("");
  } else {
    awardSection.style.display = "none";
    awardList.innerHTML = "";
  }
  document.getElementById("eventCount").textContent = events.length;
  document.getElementById("bestRank").textContent = ranks.length ? Math.min(...ranks) : "-";
  document.getElementById("avgPrCount").textContent = avgPrCount;
  document.getElementById("singlePrCount").textContent = singlePrCount;
  document.getElementById("totalPrCount").textContent = avgPrCount + singlePrCount;
}


function startNewRecap() {
  sessionStorage.removeItem("competitionRecapData");
  location.href = "/competition-recap.html?new=1";
