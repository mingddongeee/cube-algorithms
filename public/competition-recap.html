<!DOCTYPE html>
<html lang="ko">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Competition Recap 만들기
  </title>
  <style>
   * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  background: #f5f5f5;
  color: #111;
  transition: 0.3s;
}

a {
  text-decoration: none;
  color: inherit;
}

button {
  border: none;
  cursor: pointer;
  font-family: sans-serif;
}

header {
  width: 100%;
  height: 85px;
  background: #050505;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 50px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  font-size: 22px;
}

.logo h1 {
  color: white;
  font-size: 22px;
  white-space: nowrap;
}

.yellow {
  color: #ffd400;
}

nav {
  display: flex;
  align-items: center;
  gap: 65px;
  margin-left: 60px;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 18px;
  font-weight: 500;
  padding: 28px 0;
  position: relative;
  transition: 0.2s;
}

nav>a:hover,
.dropdown>a:hover {
  color: #facc15;
}

nav>a.active,
.dropdown>a.active {
  color: #facc15;
}

nav>a.active::after,
.dropdown>a.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 18px;
  width: 100%;
  height: 4px;
  background: #facc15;
  border-radius: 999px;
}

.dropdown {
  position: relative;
}

.dropdown>a {
  display: block;
}

.dropdown-menu {
  position: absolute;
  top: 78px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  min-width: 190px;
  padding: 10px;
  background: #111;
  border-radius: 18px;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
  opacity: 0;
  visibility: hidden;
  transition: 0.2s;
  z-index: 999;
}

.dropdown:hover .dropdown-menu {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
}

.dropdown-menu a {
  display: block;
  padding: 12px 16px;
  color: white;
  font-size: 15px;
  font-weight: 500;
  border-radius: 12px;
  white-space: nowrap;
}

.dropdown-menu a:hover {
  background: #facc15;
  color: #111;
}

.icon-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #ffd400;
  color: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  transition: 0.2s;
  cursor: pointer;
}

.icon-btn:hover {
  border: 2px solid white;
  transform: translateY(-2px);
}

.container {
  width: 95%;
  margin: 30px auto;
  display: flex;
  flex-direction: column;
  gap: 30px;
}

.hero {
  background: #fff7df;
  border-radius: 30px;
  padding: 55px 70px;
  min-height: 310px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  overflow: hidden;
  border: 1px solid #f3df9c;
}

.hero::after {
  content: "";
  width: 180px;
  height: 180px;
  border: 5px solid #ffe58a;
  border-radius: 25px;
  position: absolute;
  right: -40px;
  bottom: -35px;
  opacity: 0.35;
}

.hero-text {
  position: relative;
  z-index: 2;
}

.page-label {
  display: inline-block;
  background: #ffd400;
  color: black;
  padding: 8px 16px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 18px;
}

.hero-text h1 {
  font-size: 66px;
  margin-bottom: 22px;
}

.hero-text p {
  font-size: 20px;
  line-height: 1.7;
  color: #333;
}

.section {
  background: white;
  border-radius: 28px;
  padding: 32px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
}

.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 20px;
}

.title-bar {
  width: 6px;
  height: 30px;
  background: #ffd400;
  border-radius: 999px;
}

.section-desc {
  color: #555;
  font-size: 16px;
  line-height: 1.7;
  margin-bottom: 24px;
}

.form-box {
  background: #fff7df;
  border: 1px solid #f3df9c;
  border-radius: 26px;
  padding: 32px;
}

label {
  display: block;
  font-weight: bold;
  margin-top: 15px;
  margin-bottom: 6px;
  font-size: 14px;
}

input,
select {
  width: 100%;
  padding: 13px 14px;
  border: 1px solid #ddd;
  border-radius: 14px;
  font-size: 15px;
  background: white;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.check-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  background: white;
  border: 1px solid #ddd;
  border-radius: 14px;
  padding: 11px;
  font-weight: bold;
  font-size: 13px;
}

.check-label input {
  width: auto;
}

.theme-select {
  display: flex;
  align-items: center;
  gap: 10px;
}

.theme-preview {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  border: 1px solid #ddd;
  flex-shrink: 0;
}

.photo-controls {
  display: none;
  background: #f4f4f5;
  border-radius: 18px;
  padding: 16px;
  margin-top: 12px;
}

.event-form {
  background: #f4f4f5;
  border-radius: 20px;
  padding: 18px;
  margin-top: 18px;
  border: 1px solid #e5e7eb;
}

.form-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.remove-btn {
  width: auto;
  margin: 0;
  padding: 7px 10px;
  background: #ef4444;
  color: white;
  border-radius: 10px;
  font-size: 12px;
}

.attempt-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px;
}

.attempt-grid input {
  padding: 10px 8px;
  text-align: center;
  font-size: 13px;
}

.auto-result {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

.auto-box {
  background: white;
  border-radius: 14px;
  padding: 12px;
  border: 1px solid #ddd;
}

.auto-box span {
  display: block;
  color: #777;
  font-size: 12px;
  margin-bottom: 4px;
}

.auto-box strong {
  font-size: 18px;
}

.check-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 14px;
}

.record-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}

.custom-event-wrap {
  display: none;
}

.red-check {
  accent-color: #ef4444;
}

.blue-check {
  accent-color: #3b82f6;
}

.gold-check {
  accent-color: #facc15;
}

.button-row {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin-top: 26px;
}

.main-btn,
.gray-btn,
.yellow-btn,
.red-btn {
  padding: 16px 34px;
  border-radius: 16px;
  font-size: 18px;
  font-weight: bold;
  transition: 0.2s;
}

.main-btn,
.yellow-btn {
  background: #ffd400;
  color: black;
}

.gray-btn {
  background: white;
  color: #333;
  border: 1px solid #e5e7eb;
}

.red-btn {
  background: #ef4444;
  color: white;
}

.main-btn:hover,
.gray-btn:hover,
.yellow-btn:hover,
.red-btn:hover {
  transform: translateY(-3px);
}

body.dark {
  background: #111827;
  color: white;
}

body.dark .hero,
body.dark .section {
  background: #1f2937;
  border-color: #374151;
  box-shadow: none;
}

body.dark .hero-text p,
body.dark .section-desc {
  color: #cbd5e1;
}

body.dark .form-box {
  background: #111827;
  border-color: #374151;
}

body.dark .event-form {
  background: #111827;
  border-color: #374151;
}

body.dark input,
body.dark select,
body.dark .check-label,
body.dark .auto-box {
  background: #1f2937;
  color: white;
  border-color: #374151;
}

body.dark .photo-controls {
  background: #111827;
}

body.dark .hero::after {
  border-color: #374151;
}

@media(max-width:1000px){

  nav{
    gap:20px;
    margin-left:0;
  }

  .hero{
    padding:45px 35px;
  }

  .hero-text h1{
    font-size:52px;
  }

  .two-col,
  .check-row,
  .record-row{
    grid-template-columns:1fr;
  }

  .button-row{
    flex-direction:column;
  }

  .quiz-box{
    grid-template-columns:1fr;
  }
}

@media(max-width:650px){

  header{
    padding:0 20px;
  }

  nav{
    display:none;
  }

  .container{
    width:92%;
    margin:20px auto;
  }

  .hero{
    flex-direction:column;
    align-items:flex-start;
    padding:36px 28px;
    min-height:auto;
  }

  .hero-text h1{
    font-size:42px;
  }

  .hero-text p{
    font-size:16px;
  }

  .section{
    padding:22px;
  }

  .form-box{
    padding:22px;
  }

  .attempt-grid{
    grid-template-columns:1fr;
  }

  .button-row{
    flex-direction:column;
  }

  .main-btn,
  .gray-btn,
  .yellow-btn,
  .red-btn{
    width:100%;
    font-size:16px;
  }

  .theme-select{
    flex-direction:column;
    align-items:flex-start;
  }

  .theme-preview{
    width:100%;
    height:50px;
  }

  input,
  select{
    font-size:16px;
  }
}

  </style>

themeBtn.addEventListener("click", () => {

});

const roundOrder = {
  "1Round": 1,
  "2Round": 2,
  "3Round": 3,
  "4Round": 4,
  "5Round": 5,
  "Final": 6,
  "Head-to-Head": 7
};
const lightThemes = ["#f8fafc", "#fef3c7", "#fde2e4", "#e0f2fe", "#dcfce7", "#ede9fe", "#ffedd5", "#ccfbf1", "#fae8ff", "#dbeafe"];
["compName", "compDate", "compVenue", "playerKr", "playerEn", "wcaId", "firstComp", "isWcaCompetition", "bestStaff", "showQr", "cardTheme", "photoZoom", "photoX", "photoY"].forEach(id => {
  document.getElementById(id).addEventListener("input", handleMainInput);
  document.getElementById(id).addEventListener("change", handleMainInput);
});
document.getElementById("photoInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    uploadedImage = ev.target.result;
    document.getElementById("photoControls").style.display = "block";
  };
  reader.readAsDataURL(file);
});

function handleMainInput() {
  const firstComp = document.getElementById("firstComp"),
    wcaId = document.getElementById("wcaId");
  if (firstComp.checked) {
    wcaId.value = "";
    wcaId.disabled = true;
    wcaId.placeholder = "첫 참가자는 WCA ID 없음";
  } else {
    wcaId.disabled = false;
    wcaId.placeholder = "WCA ID를 입력하세요";
  }
  updateThemePreview();
}

function updateThemePreview() {
  document.getElementById("themePreview").style.background = document.getElementById("cardTheme").value;
}

function deletePhoto() {
  uploadedImage = "";
  document.getElementById("photoInput").value = "";
  document.getElementById("photoControls").style.display = "none";
  document.getElementById("photoZoom").value = 1;
  document.getElementById("photoX").value = 50;
  document.getElementById("photoY").value = 50;
}

function makeEventOptions(selected) {
  const official = eventOptions.map(e => `<option value="${e.short}" ${selected===e.short?"selected":""}>${e.name}</option>`).join("");
  return `<optgroup label="WCA 공인 종목">${official}</optgroup><option value="CUSTOM" ${selected==="CUSTOM"?"selected":""}>직접 입력</option>`;
}

function makeCalcOptions(selected) {
  return Object.entries(calcOptions).map(([v, i]) => `<option value="${v}" ${selected===v?"selected":""}>${i.label}</option>`).join("");
}

function getEventInfo(short) {
  return eventOptions.find(e => e.short === short) || null;
}

function addEventForm(eventData = null) {
  const eventForms = document.getElementById("eventForms");
  const form = document.createElement("div");
  form.className = "event-form";
  form.innerHTML = `<div class="form-head"><strong>종목 기록</strong><button class="remove-btn" onclick="removeEventForm(this)">삭제</button></div><label>종목명</label><select class="event-select">${makeEventOptions("3x3")}</select><div class="custom-event-wrap"><label>직접 입력 종목명</label><input class="custom-event-input" placeholder="예: FTO, Team Blind, Relay"></div><label>계산 방식</label><select class="calc-type-select">${makeCalcOptions("ao5")}</select><label>라운드</label><select class="round-input"><option>1Round</option><option>2Round</option><option>3Round</option><option>4Round</option><option>5Round</option><option>Final</option><option>Head-to-Head</option></select><div class="two-col"><div><label>내 순위</label><input class="rank-input" placeholder="예: 57"></div><div><label>전체 인원</label><input class="total-input" placeholder="예: 182"></div></div><label>Attempts</label><div class="attempt-grid"></div><div class="auto-result"><div class="auto-box"><span class="avg-title">Average</span><strong class="auto-avg">-</strong></div><div class="auto-box"><span class="best-title">Best</span><strong class="auto-best">-</strong></div></div><label>상 받은 종목</label><select class="medal-input" disabled><option value="">Final / Head-to-Head에서만 선택</option><option value="1st">1등</option><option value="2nd">2등</option><option value="3rd">3등</option></select><div class="check-row"><label class="check-label"><input type="checkbox" class="avg-pr-input red-check">Average PR</label><label class="check-label"><input type="checkbox" class="single-pr-input blue-check">Single PR</label></div><div class="record-row"><label class="check-label"><input type="checkbox" class="wr-input gold-check">WR</label><label class="check-label"><input type="checkbox" class="cr-input gold-check">CR</label><label class="check-label"><input type="checkbox" class="nr-input gold-check">NR</label></div>`;
  eventForms.appendChild(form);
  form.querySelector(".event-select").addEventListener("change", () => {
    syncCalcTypeWithEvent(form);
    updateEventForm(form);
  });
  form.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input", () => updateEventForm(form));
    el.addEventListener("change", () => updateEventForm(form));
  });
  if (eventData) {
    fillEventForm(form, eventData);
  } else {
    syncCalcTypeWithEvent(form);
    updateEventForm(form);
  }
}


function fillEventForm(form, eventData) {
  const knownEvent = getEventInfo(eventData.event);
  const eventSelect = form.querySelector(".event-select");
  const customInput = form.querySelector(".custom-event-input");
  const calcSelect = form.querySelector(".calc-type-select");

  eventSelect.value = knownEvent ? eventData.event : "CUSTOM";
  customInput.value = knownEvent ? "" : (eventData.event || "");

  syncCalcTypeWithEvent(form);

  calcSelect.value = eventData.calcType || (knownEvent ? knownEvent.calcType : "ao5");
  form.querySelector(".round-input").value = eventData.round || "1Round";
  form.querySelector(".rank-input").value = eventData.rank || "";
  form.querySelector(".total-input").value = eventData.total || "";
  form.querySelector(".avg-pr-input").checked = !!eventData.avgPr;
  form.querySelector(".single-pr-input").checked = !!eventData.singlePr;
  form.querySelector(".wr-input").checked = !!eventData.wr;
  form.querySelector(".cr-input").checked = !!eventData.cr;
  form.querySelector(".nr-input").checked = !!eventData.nr;

  updateAttemptInputs(form);

  const attemptInputs = form.querySelectorAll(".attempt-input");
  (eventData.attempts || []).forEach((value, index) => {
    if (attemptInputs[index]) {
      attemptInputs[index].value = value;
    }
  });

  updateEventForm(form);

  const medal = form.querySelector(".medal-input");
  if (eventData.medal && !medal.disabled) {
    medal.value = eventData.medal;
  }
}

function syncCalcTypeWithEvent(form) {
  const eventShort = form.querySelector(".event-select").value;
  const eventInfo = getEventInfo(eventShort);
  const customWrap = form.querySelector(".custom-event-wrap");
  const calcSelect = form.querySelector(".calc-type-select");
  customWrap.style.display = eventShort === "CUSTOM" ? "block" : "none";
  if (eventInfo) calcSelect.value = eventInfo.calcType || "ao5";
}

function updateAttemptInputs(form) {
  const calcType = form.querySelector(".calc-type-select").value;
  const count = calcOptions[calcType].inputs;
  const grid = form.querySelector(".attempt-grid");
  const oldValues = [...grid.querySelectorAll(".attempt-input")].map(i => i.value);
  if (grid.querySelectorAll(".attempt-input").length === count) return;
  grid.innerHTML = "";
  grid.style.gridTemplateColumns = `repeat(${Math.min(count,5)},1fr)`;
  for (let i = 0; i < count; i++) {
    const input = document.createElement("input");
    input.className = "attempt-input";
    input.placeholder = String(i + 1);
    input.value = oldValues[i] || "";
    input.addEventListener("input", () => updateEventForm(form));
    input.addEventListener("change", () => updateEventForm(form));
    grid.appendChild(input);
  }
}

function updateEventForm(form) {
  updateAttemptInputs(form);
  const round = form.querySelector(".round-input").value;
  const medal = form.querySelector(".medal-input");
  if (round === "Final" || round === "Head-to-Head") {
    medal.disabled = false;
    medal.options[0].textContent = "없음";
  } else {
    medal.value = "";
    medal.disabled = true;
    medal.options[0].textContent = "Final / Head-to-Head에서만 선택";
  }
  const calcType = form.querySelector(".calc-type-select").value;
  const calculated = calculateResult(getAttemptsFromForm(form), calcType);
  form.querySelector(".avg-title").textContent = calcOptions[calcType].avgLabel;
  form.querySelector(".best-title").textContent = calcOptions[calcType].bestLabel;
  form.querySelector(".auto-avg").textContent = calculated.avg;
  form.querySelector(".auto-best").textContent = calculated.best;
}

function removeEventForm(button) {
  const forms = document.querySelectorAll(".event-form");
  if (forms.length <= 1) {
    alert("종목 기록은 최소 1개 있어야 합니다.");
    return;
  }
  button.closest(".event-form").remove();
}

function getAttemptsFromForm(form) {
  return [...form.querySelectorAll(".attempt-input")].map(i => i.value.trim()).filter(v => v);
}

function parseTimeToSeconds(value) {
  const upper = value.toUpperCase();
  if (upper === "DNF" || upper === "DNS") return null;
  if (value.includes(":")) {
    const parts = value.split(":"),
      m = parseFloat(parts[0]),
      s = parseFloat(parts[1]);
    if (isNaN(m) || isNaN(s)) return null;
    return m * 60 + s;
  }
  const seconds = parseFloat(value);
  return isNaN(seconds) ? null : seconds;
}

function formatSeconds(seconds) {
  if (seconds === null) return "DNF";
  if (seconds >= 60) {
    const min = Math.floor(seconds / 60);
    const sec = (seconds % 60).toFixed(2).padStart(5, "0");
    return `${min}:${sec}`;
  }
  return seconds.toFixed(2);
}

function calculateFmc(attempts) {
  if (attempts.length === 0) return {
    avg: "-",
    best: "-"
  };
  const nums = attempts.map(v => {
    const u = v.toUpperCase();
    if (u === "DNF" || u === "DNS") return null;
    const n = parseFloat(v);
    return isNaN(n) ? null : n;
  });
  const valid = nums.filter(n => n !== null);
  const best = valid.length ? String(Math.min(...valid)) : "DNF";
  if (nums.length < 3) return {
    avg: "-",
    best
  };
  if (nums.some(n => n === null)) return {
    avg: "DNF",
    best
  };
  const mean = nums.reduce((s, n) => s + n, 0) / nums.length;
  return {
    avg: mean.toFixed(2),
    best
  };
}

function calculateResult(attempts, calcType) {
  if (calcType === "fmc") return calculateFmc(attempts);
  if (attempts.length === 0) return {
    avg: "-",
    best: "-"
  };
  const parsed = attempts.map(time => ({
    raw: time,
    sec: parseTimeToSeconds(time)
  }));
  const valid = parsed.filter(t => t.sec !== null);
  const best = valid.length ? formatSeconds(Math.min(...valid.map(t => t.sec))) : "DNF";
  if (calcType === "wo3") {
    const worst = parsed.some(t => t.sec === null) ? "DNF" : formatSeconds(Math.max(...parsed.map(t => t.sec)));
    return {
      avg: "-",
      best: worst
    };
  }
  if (calcType === "single" || calcType === "bo3") return {
    avg: "-",
    best
  };
  if (calcType === "mo3") {
    if (parsed.length < 3) return {
      avg: "-",
      best
    };
    if (parsed.some(t => t.sec === null)) return {
      avg: "DNF",
      best
    };
    return {
      avg: formatSeconds(parsed.reduce((s, t) => s + t.sec, 0) / parsed.length),
      best
    };
  }
  if (calcType === "ao5") {
    if (parsed.length < 5) return {
      avg: "-",
      best
    };
    const sorted = [...parsed].sort((a, b) => {
      if (a.sec === null && b.sec === null) return 0;
      if (a.sec === null) return 1;
      if (b.sec === null) return -1;
      return a.sec - b.sec;
    });
    const middle = sorted.slice(1, 4);
    if (middle.some(t => t.sec === null)) return {
      avg: "DNF",
      best
    };
    return {
      avg: formatSeconds(middle.reduce((s, t) => s + t.sec, 0) / 3),
      best
    };
  }
  return {
    avg: "-",
    best
  };
}

function getEventData() {
  return [...document.querySelectorAll(".event-form")].map(form => {
    const eventShort = form.querySelector(".event-select").value;
    const eventInfo = getEventInfo(eventShort);
    const calcType = form.querySelector(".calc-type-select").value;
    const attempts = getAttemptsFromForm(form);
    const calculated = calculateResult(attempts, calcType);
    const customName = form.querySelector(".custom-event-input").value.trim();
    const eventName = eventInfo ? eventInfo.short : (customName || "Custom");
    return {
      event: eventName,
      eventFullName: eventInfo ? eventInfo.name : eventName,
      eventImg: eventInfo ? eventInfo.img : "",
      eventOrder: eventInfo ? eventInfo.order : 999,
      calcType,
      avgLabel: calcOptions[calcType].avgLabel,
      bestLabel: calcOptions[calcType].bestLabel,
      round: form.querySelector(".round-input").value,
      roundOrder: roundOrder[form.querySelector(".round-input").value],
      rank: form.querySelector(".rank-input").value.trim(),
      total: form.querySelector(".total-input").value.trim(),
      avg: calculated.avg,
      best: calculated.best,
      attempts,
      medal: form.querySelector(".medal-input").disabled ? "" : form.querySelector(".medal-input").value,
      avgPr: form.querySelector(".avg-pr-input").checked,
      singlePr: form.querySelector(".single-pr-input").checked,
      wr: form.querySelector(".wr-input").checked,
      cr: form.querySelector(".cr-input").checked,
      nr: form.querySelector(".nr-input").checked
    };
  }).sort((a, b) => {
    if (a.eventOrder !== b.eventOrder) return a.eventOrder - b.eventOrder;
    if (a.event !== b.event) return a.event.localeCompare(b.event);
    return a.roundOrder - b.roundOrder;
  });
}

function collectRecapData() {
  return {
    compName: document.getElementById("compName").value.trim(),
    compDate: document.getElementById("compDate").value,
    compVenue: document.getElementById("compVenue").value.trim(),
    playerKr: document.getElementById("playerKr").value.trim(),
    playerEn: document.getElementById("playerEn").value.trim(),
    wcaId: document.getElementById("wcaId").value.trim(),
    firstComp: document.getElementById("firstComp").checked,
    isWcaCompetition: document.getElementById("isWcaCompetition").checked,
    bestStaff: document.getElementById("bestStaff").checked,
    showQr: document.getElementById("showQr").checked,
    theme: document.getElementById("cardTheme").value,
    uploadedImage,
    photoZoom: document.getElementById("photoZoom").value,
    photoX: document.getElementById("photoX").value,
    photoY: document.getElementById("photoY").value,
    events: getEventData()
  };
}

function applySavedRecapData(data) {
  if (!data) return;

  document.getElementById("compName").value = data.compName || "";
  document.getElementById("compDate").value = data.compDate || "";
  document.getElementById("compVenue").value = data.compVenue || "";
  document.getElementById("playerKr").value = data.playerKr || "";
  document.getElementById("playerEn").value = data.playerEn || "";
  document.getElementById("wcaId").value = data.wcaId || "";
  document.getElementById("firstComp").checked = !!data.firstComp;
  document.getElementById("isWcaCompetition").checked = !!data.isWcaCompetition;
  document.getElementById("bestStaff").checked = !!data.bestStaff;
  document.getElementById("showQr").checked = !!data.showQr;
  document.getElementById("cardTheme").value = data.theme || data.cardTheme || "#111111";
  document.getElementById("photoZoom").value = data.photoZoom || "1";
  document.getElementById("photoX").value = data.photoX || "50";
  document.getElementById("photoY").value = data.photoY || "50";

  uploadedImage = data.uploadedImage || data.photoData || "";
  document.getElementById("photoControls").style.display = uploadedImage ? "block" : "none";

  document.getElementById("eventForms").innerHTML = "";

  if (data.events && data.events.length > 0) {
    data.events.forEach(eventData => addEventForm(eventData));
  } else {
    addEventForm();
  }

  handleMainInput();
  updateThemePreview();
}

function loadSavedRecapData() {
  const params = new URLSearchParams(window.location.search);

  if (params.get("new") === "1") {
    sessionStorage.removeItem("competitionRecapData");
    addEventForm();
    updateThemePreview();
    return;
  }

  const saved = sessionStorage.getItem("competitionRecapData");

  if (!saved) {
    addEventForm();
    updateThemePreview();
    return;
  }

  try {
    applySavedRecapData(JSON.parse(saved));
  } catch (error) {
    sessionStorage.removeItem("competitionRecapData");
    addEventForm();
    updateThemePreview();
  }
}

function startNewRecap() {
  const ok = confirm("입력 중인 리캡 정보를 모두 지우고 새로 만들까요?");

  if (!ok) return;

  sessionStorage.removeItem("competitionRecapData");
  location.href = "/competition-recap.html?new=1";
}

async function saveRecapAndMove() {
  const data = collectRecapData();
  sessionStorage.setItem("competitionRecapData", JSON.stringify(data));
  try {
    await fetch("/saveRecap", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });
  } catch (e) {}

  window.open(
    "/recap-result.html",
    "_blank"
  );
}
loadSavedRecapData();
